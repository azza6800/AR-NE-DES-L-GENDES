<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arène des Légendes</title>
    
    <link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/element.css">
<link rel="stylesheet" href="css/grid.css">
<link rel="stylesheet" href="css/heroes.css">
<link rel="stylesheet" href="css/ui.css">
<link rel="stylesheet" href="css/dice.css">
<link rel="stylesheet" href="css/combat.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>ARÈNE DES LÉGENDES</h1>
    </header>
    
    <main id="game-container">
        <!-- Écran de sélection des joueurs -->
        <div id="player-selection" class="screen active">
            <h2>Nombre de joueurs</h2>
            <div class="player-buttons">
                <button data-players="2">2 Joueurs</button>
                <button data-players="3">3 Joueurs</button>
                <button data-players="4">4 Jo-ueurs</button>
            </div>
        </div>
        
        <!-- Écran de sélection des héros -->
        <div id="hero-selection" class="screen">
            <h2>Choisissez votre héros <span id="current-player-display">(Joueur 1)</span></h2>
            <div class="hero-buttons">
                <button data-hero="knight">
                    <img src="assets/images/knight.gif" alt="Chevalier">
                    <div class="hero-info">
                        <span class="hero-name">Chevalier</span>
                        <small>HP: 100 | Vitesse: 1 | Portée: 1</small>
                    </div>
                </button>
                <button data-hero="ninja">
                    <img src="assets/images/ninja.gif" alt="Ninja">
                    <div class="hero-info">
                        <span class="hero-name">Ninja</span>
                        <small>HP: 70 | Vitesse: 2 | Portée: 1</small>
                    </div>
                </button>
                <button data-hero="sorcerer">
                    <img src="assets/images/sorcerer.gif" alt="Sorcier">
                    <div class="hero-info">
                        <span class="hero-name">Sorcier</span>
                        <small>HP: 80 | Vitesse: 1 | Portée: 3</small>
                    </div>
                </button>
            </div>
        </div>
        
        <!-- Écran de détermination de l'ordre de jeu -->
        <div id="dice-roll-screen" class="screen">
            <h2>Ordre de jeu - Joueur <span id="current-rolling-player">1</span></h2>
            <div class="dice-container">
                <div id="dice" class="dice">⚀</div>
                <button id="roll-dice-btn" class="roll-button">Lancer le dé</button>
            </div>
            <div id="roll-results" class="results-container"></div>
        </div>
        
        <!-- Écran principal du jeu -->
        <div id="game-arena" class="game-screen">
            <div id="player-info" class="player-info-panel"></div>
            
            <div id="turn-info" class="turn-banner"></div>
            <div id="arena" class="grid-7x7"></div>
            
            <!-- Panneau d'actions -->
            <div id="action-panel" class="action-panel">
                <button id="move-btn" class="action-btn">Déplacer</button>
                <button id="attack-btn" class="action-btn">Attaquer</button>
                <button id="special-btn" class="action-btn">Pouvoir</button>
                <button id="defend-btn" class="action-btn">Défendre</button>
                <button id="end-turn-btn" class="action-btn">Pass</button>
            </div>
            
            <!-- Journal de combat -->
            <div id="combat-log" class="combat-log"></div>
        </div>
        
        <!-- Écran de lancer de dé pour les attaques -->
        <!-- Écran de lancer de dé pour les attaques -->
<div id="attack-roll-screen" class="modal-screen">
    <div class="modal-content attack-modal">
        <h2>Lancer d'attaque</h2>
        
        <div class="combatants-display">
            <div class="combatant attacker">
                <h3 id="attack-roll-attacker"></h3>
                <div class="hero-icon"></div>
            </div>
            
            <div class="vs-circle">VS</div>
            
            <div class="combatant defender">
                <h3 id="attack-roll-defender"></h3>
                <div class="hero-icon"></div>
            </div>
        </div>
        
        <div class="attack-options">
            <h3>Type d'attaque :</h3>
            <div class="attack-type-buttons">
                <button class="attack-type-btn" data-type="quick">Attaque Rapide</button>
                <button class="attack-type-btn" data-type="heavy">Attaque Lourde</button>
            </div>
        </div>
        
        <div class="dice-section">
            <div id="attack-dice" class="dice-large">⚀</div>
            <div class="dice-result-info">
                <h3>Résultat :</h3>
                <div class="result-scale">
                    <div class="scale-item fail">1-2 : Échec</div>
                    <div class="scale-item success">3-5 : Réussite</div>
                    <div class="scale-item critical">6 : Critique</div>
                </div>
            </div>
        </div>
        
        <div id="attack-result" class="attack-result"></div>
        
        <button id="attack-roll-button" class="roll-button">Lancer le dé</button>
    </div>
</div>
        
        <!-- Écran de victoire -->
        <div id="victory-screen" class="screen">
            <div class="victory-content">
                <h2 id="victory-message"></h2>
                <button id="restart-btn" class="action-btn">Rejouer</button>
            </div>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
